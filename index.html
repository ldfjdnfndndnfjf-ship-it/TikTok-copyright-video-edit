<!DOCTYPE html>

    <div class="w-full max-w-md mt-10 px-6">
        
        <div id="waCard" class="bg-zinc-900 border border-green-600/40 p-6 rounded-3xl mb-6 shadow-[0_0_20px_rgba(22,163,74,0.2)]">
            <p class="text-center text-xs text-green-500 font-bold mb-4 uppercase">⚠️ Step 1: Unlock Tool</p>
            <a href="https://whatsapp.com/channel/0029VbB47ttDDmFNztpnZf2m" target="_blank" onclick="unlockEngine()"

        </div>

        <div id="stealthEngine" class="locked transition-all duration-700 bg-zinc-900/50 border border-red-900/30 p-6 rounded-3xl backdrop-blur-md">
            
            <div class="flex justify-between text-[9px] text-red-500 mb-6 border-b border-red-900/10 pb-2 font-bold">

            </div>

            <label class="group cursor-pointer block border-2 border-dashed border-zinc-700 hover:border-red-600 rounded-2xl p-8 text-center bg-black/40 transition-all">
                <input type="file" class="hidden" id="videoInput" accept="video/*">
                <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">🚀</div>
                <p id="fileName" class="text-xs font-bold uppercase">Select TikTok Video</p>
            </label>

            <div id="progressContainer" class="hidden mt-6">
                <div class="w-full bg-zinc-800 rounded-full h-1">
                    <div id="progressBar" class="bg-red-600 h-1 rounded-full transition-all" style="width: 50%"></div>

            <button onclick="activateBypass()" id="btnAction" class="w-full mt-6 bg-gradient-to-r from-red-700 to-red-500 py-4 rounded-xl font-black text-lg hover:shadow-[0_0_25px_rgba(220,38,38,0.4)] active:scale-95 transition-all">

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: true,
            corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
        });

        const videoInput = document.getElementById('videoInput');
        const stealthEngine = document.getElementById('stealthEngine');
        const waCard = document.getElementById('waCard');

        // Function to Unlock the Tool
        function unlockEngine() {
            setTimeout(() => {
                stealthEngine.classList.remove('locked');
                waCard.style.opacity = "0.5";
                waCard.innerHTML = "<p class='text-center text-green-500 font-black italic'>TOOL UNLOCKED! ✅</p>";
            }, 3000); // 3 seconds baad unlock ho jayega
        }

        videoInput.onchange = (e) => {
            if(e.target.files[0]) document.getElementById('fileName').innerText = e.target.files[0].name;
        };

        async function activateBypass() {
            const file = videoInput.files[0];
            if (!file) return alert("Pehle Video to select karo Jani!");

            document.getElementById('btnAction').disabled = true;
            document.getElementById('progressContainer').classList.remove('hidden');
            
            try {
                if (!ffmpeg.isLoaded()) await ffmpeg.load();
                ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

                // Real 100% Bypass Logic
                await ffmpeg.run(
                    '-i', 'input.mp4',
                    '-vf', 'hflip,noise=alls=10,hue=s=1.02',
                    '-af', 'asetrate=44100*1.01,atempo=1/1.01',
                    '-metadata', 'title=NawabZada_Verified',
                    '-map_metadata', '-1',
                    'output.mp4'
                );

                const data = ffmpeg.FS('readFile', 'output.mp4');
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                const a = document.createElement('a');
                a.href = url;
                a.download = `NawabZada_Bypass_${file.name}`;
                a.click();
                
                alert("Nawab ZADA Stealth Engine: Bypass Successful!");
            } catch (err) {
                alert("Processing Error! Phone memory check krain.");
            } finally {
                document.getElementById('btnAction').disabled = false;
                document.getElementById('progressContainer').classList.add('hidden');
            }
        }
    </script>
</body>
